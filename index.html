<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>医療情報技師 過去問演習</title>
<meta name="theme-color" content="#1565c0">
<!-- iPhone「ホーム画面に追加」でアプリのように起動 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="過去問演習">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --bg: #f4f6f9; --card: #ffffff; --ink: #1f2933; --sub: #66758a;
    --line: #e2e8f0; --brand: #1565c0; --brand-d: #0d47a1;
    --ok: #2e7d32; --ok-bg: #e8f5e9; --ng: #c62828; --ng-bg: #fdecea;
    --accent: #ff8f00; --shadow: 0 2px 14px rgba(20,40,80,.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.6;
    padding: env(safe-area-inset-top) calc(14px + env(safe-area-inset-right))
             env(safe-area-inset-bottom) calc(14px + env(safe-area-inset-left));
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 18px 0 60px; }
  h1 { font-size: 1.35rem; margin: 6px 0 2px; }
  h1 small { display:block; font-size:.78rem; color:var(--sub); font-weight:400; margin-top:4px; }
  .card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); padding: 18px; margin: 14px 0; }
  .muted { color: var(--sub); font-size: .85rem; }
  .stat-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
  .stat { flex:1; min-width:120px; background:#eef3fb; border-radius:10px; padding:10px 12px; }
  .stat b { font-size:1.4rem; color:var(--brand-d); display:block; }
  .section-title { font-weight:700; margin:0 0 8px; font-size:.95rem; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { display:inline-flex; align-items:center; gap:6px; border:1.5px solid var(--line);
    border-radius:999px; padding:7px 14px; cursor:pointer; font-size:.9rem; user-select:none;
    background:#fff; transition:.12s; }
  .chip.on { background:var(--brand); border-color:var(--brand); color:#fff; }
  .chip input { display:none; }
  .mini-btn { background:none; border:none; color:var(--brand); font-size:.82rem; cursor:pointer; padding:4px; }
  .modes { display:grid; grid-template-columns:1fr; gap:10px; }
  .mode { border:1.5px solid var(--line); border-radius:12px; padding:13px 14px; cursor:pointer; transition:.12s; }
  .mode.on { border-color:var(--brand); background:#eef3fb; }
  .mode b { display:block; font-size:.98rem; }
  .mode span { font-size:.82rem; color:var(--sub); }
  .count-line { text-align:center; margin:10px 0; font-size:.95rem; }
  .count-line b { color:var(--brand-d); font-size:1.25rem; }
  button.primary { width:100%; background:var(--brand); color:#fff; border:none; border-radius:12px;
    padding:15px; font-size:1.05rem; font-weight:700; cursor:pointer; transition:.12s; }
  button.primary:hover { background:var(--brand-d); }
  button.primary:disabled { background:#b6c2d4; cursor:not-allowed; }
  .ghost { background:#fff; border:1.5px solid var(--line); color:var(--ink); border-radius:12px;
    padding:13px; font-size:.95rem; font-weight:600; cursor:pointer; width:100%; }
  .ghost:hover { border-color:var(--brand); color:var(--brand); }
  .row-btns { display:flex; gap:10px; margin-top:10px; }
  .row-btns > * { flex:1; }
  /* quiz */
  .qbar { display:flex; justify-content:space-between; align-items:center; font-size:.85rem; color:var(--sub); }
  .progress { height:7px; background:var(--line); border-radius:99px; overflow:hidden; margin:8px 0 4px; }
  .progress > i { display:block; height:100%; background:var(--brand); transition:width .3s; }
  .qmeta { font-size:.78rem; color:var(--sub); margin-bottom:6px; }
  .stem { font-size:1.1rem; font-weight:600; margin:4px 0 14px; white-space:pre-wrap; }
  .choice { display:flex; gap:10px; align-items:flex-start; border:1.5px solid var(--line);
    border-radius:11px; padding:12px 14px; margin:9px 0; cursor:pointer; transition:.1s; background:#fff; }
  .choice:hover { border-color:#aac1e0; }
  .choice .num { flex:0 0 26px; height:26px; border-radius:50%; background:#eef3fb; color:var(--brand-d);
    font-weight:700; display:flex; align-items:center; justify-content:center; font-size:.85rem; }
  .choice.sel { border-color:var(--brand); background:#eef3fb; }
  .choice.sel .num { background:var(--brand); color:#fff; }
  .choice.correct { border-color:var(--ok); background:var(--ok-bg); }
  .choice.correct .num { background:var(--ok); color:#fff; }
  .choice.wrong { border-color:var(--ng); background:var(--ng-bg); }
  .choice.wrong .num { background:var(--ng); color:#fff; }
  .choice.locked { cursor:default; }
  .feedback { border-radius:11px; padding:12px 14px; margin:12px 0; font-weight:600; }
  .feedback.ok { background:var(--ok-bg); color:var(--ok); }
  .feedback.ng { background:var(--ng-bg); color:var(--ng); }
  .hint { font-size:.82rem; color:var(--accent); font-weight:600; margin-bottom:8px; }
  /* result */
  .score-big { text-align:center; }
  .score-big .pct { font-size:3rem; font-weight:800; color:var(--brand-d); line-height:1.1; }
  .bd { display:flex; justify-content:space-between; border-bottom:1px solid var(--line); padding:9px 2px; font-size:.92rem; }
  .bd:last-child { border-bottom:none; }
  #bookmarkBtn.on { color:var(--accent); font-weight:700; }
  /* タイムアタック タイマー */
  #timerWrap { display:flex; align-items:center; gap:8px; margin:6px 0 2px; }
  .timer-bar { flex:1; height:9px; background:var(--line); border-radius:99px; overflow:hidden; }
  .timer-bar > i { display:block; height:100%; width:100%; background:linear-gradient(90deg,#66bb6a,#2e7d32); }
  .timer-bar > i.danger { background:linear-gradient(90deg,#ef5350,#c62828); }
  .timer-text { font-size:.85rem; font-weight:700; color:var(--sub); min-width:42px; text-align:right; }
  /* AI質問モード切替 */
  .ask-mode { display:flex; gap:6px; margin-bottom:8px; }
  .askmode-chip { flex:1; border:1.5px solid var(--line); background:#fff; border-radius:8px;
    padding:7px 4px; font-size:.82rem; font-weight:600; cursor:pointer; color:var(--sub); }
  .askmode-chip.on { border-color:var(--brand); background:#eef3fb; color:var(--brand-d); }
  .ask-ai { margin:12px 0; }
  .ask-row { display:flex; gap:8px; }
  .ai-btn { flex:1; border:1.5px solid var(--line); background:#fff; border-radius:10px;
    padding:10px 6px; font-size:.88rem; font-weight:700; cursor:pointer; color:var(--ink); transition:.12s; }
  .ai-btn:hover { border-color:var(--brand); color:var(--brand); background:#f5f9ff; }
  .ai-btn[data-ai="chatgpt"]:hover { border-color:#10a37f; color:#0d8c6d; }
  .ai-btn[data-ai="claude"]:hover { border-color:#d97757; color:#c4633f; }
  .ai-btn[data-ai="gemini"]:hover { border-color:#4285f4; color:#3367d6; }
  .freqbadge { display:inline-block; background:#fff3e0; color:#e65100; border:1px solid #ffcc80;
    border-radius:6px; padding:1px 8px; font-size:.74rem; font-weight:700; }
  /* 合格判定バナー */
  .judge { border-radius:11px; padding:12px 14px; margin:12px 0 4px; font-weight:700; font-size:.95rem; }
  .judge.pass { background:var(--ok-bg); color:var(--ok); border:1px solid #a5d6a7; }
  .judge.fail { background:#fff8e1; color:#e65100; border:1px solid #ffe082; }
  .judge .sub { display:block; font-weight:500; font-size:.8rem; margin-top:3px; opacity:.85; }
  .judge-line { font-size:.72rem; color:var(--sub); margin:2px 0 10px; display:flex; align-items:center; gap:5px; }
  .judge-line .swatch { width:18px; height:0; border-top:2px dashed #e53935; display:inline-block; }
  /* 分野別正解率バー */
  .crate { margin:10px 0; }
  .crate-head { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:4px; }
  .crate-head b { color:var(--brand-d); }
  .crate-head .verdict { font-weight:700; }
  .crate-head .verdict.pass { color:var(--ok); }
  .crate-head .verdict.fail { color:#e65100; }
  .crate-bar { position:relative; height:13px; background:var(--line); border-radius:99px; }
  .crate-bar > i { display:block; height:100%; border-radius:99px; transition:width .4s; }
  .crate-bar > i.pass { background:linear-gradient(90deg,#66bb6a,#2e7d32); }
  .crate-bar > i.fail { background:linear-gradient(90deg,#ffb74d,#fb8c00); }
  /* 合格ライン(70%)マーカー */
  .crate-bar .pass-line { position:absolute; top:-3px; bottom:-3px; left:70%; width:0;
    border-left:2px dashed #e53935; }
  /* エクスポートモーダル */
  .modal { position:fixed; inset:0; background:rgba(20,30,50,.5); display:flex;
    align-items:center; justify-content:center; padding:16px; z-index:50; }
  .modal-box { background:var(--card); border-radius:14px; box-shadow:var(--shadow);
    width:100%; max-width:680px; max-height:88vh; overflow:auto; padding:18px; }
  #exportText { width:100%; height:240px; box-sizing:border-box; resize:vertical;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.8rem; line-height:1.5;
    border:1.5px solid var(--line); border-radius:10px; padding:10px; margin:10px 0;
    background:#fafbfc; color:var(--ink); }
  .hide { display:none; }
  footer { text-align:center; color:var(--sub); font-size:.72rem; margin-top:24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>医療情報技師 過去問演習<small id="bankInfo"></small></h1>

  <!-- ============ スタート画面 ============ -->
  <div id="startView">
    <div class="card" id="statsCard">
      <div class="section-title">これまでの成績</div>
      <div class="stat-row">
        <div class="stat"><b id="stAnswered">0</b><span class="muted">累計解答数</span></div>
        <div class="stat"><b id="stRate">–</b><span class="muted">通算正答率</span></div>
        <div class="stat"><b id="stWrong">0</b><span class="muted">復習待ち（誤答）</span></div>
        <div class="stat"><b id="stBookmark">0</b><span class="muted">見返す問題</span></div>
      </div>
      <div id="passJudge" class="judge hide"></div>
      <div class="section-title" style="margin:14px 0 2px;">分野別の正解率と合格ライン</div>
      <div class="judge-line"><span class="swatch"></span>赤い破線が合格ライン（70%）です</div>
      <div id="catRates"></div>
      <div class="row-btns" style="margin-top:14px;">
        <button class="primary" id="analyzeBtn" style="font-size:.95rem; padding:13px;">弱点をAIに分析してもらう</button>
      </div>
      <div class="row-btns" style="margin-top:10px;">
        <button class="ghost" id="exportWrongBtn">間違えた問題を書き出す</button>
        <button class="ghost" id="exportBookmarkBtn">見返す問題を書き出す</button>
      </div>
      <button class="mini-btn" id="resetBtn" style="margin-top:8px;">進捗をリセット</button>
    </div>

    <div class="card">
      <div class="section-title">出題モード</div>
      <div class="modes" id="modeList">
        <label class="mode on" data-mode="random">
          <b>ランダム大量演習</b><span>選んだ範囲からシャッフルして次々出題</span>
        </label>
        <label class="mode" data-mode="timeattack">
          <b>タイムアタック ⏱</b><span>1問20秒の制限つきでテンポよく大量にこなす</span>
        </label>
        <label class="mode" data-mode="freq">
          <b>頻出優先演習 ★</b><span>よく出る論点ほど高確率で出題（頻出度で重み付け）</span>
        </label>
        <label class="mode" data-mode="cluster">
          <b>類似問まとめ演習</b><span>同じ論点の類似問を連続で出題しパターンを習得</span>
        </label>
        <label class="mode" data-mode="year">
          <b>年度別演習</b><span>選んだ年度を問番号順に通しで演習（本番想定）</span>
        </label>
        <label class="mode" data-mode="wrong">
          <b>間違い復習</b><span>過去に誤答した問題だけを再出題</span>
        </label>
        <label class="mode" data-mode="bookmark">
          <b>見返す問題</b><span>「後で見返す」に登録した問題を演習</span>
        </label>
      </div>
    </div>

    <div class="card" id="filterCard">
      <div class="section-title">分野</div>
      <div class="chips" id="catChips"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin:16px 0 8px;">
        <div class="section-title" style="margin:0;">年度</div>
        <div>
          <button class="mini-btn" id="yearAll">全選択</button>
          <button class="mini-btn" id="yearNone">全解除</button>
        </div>
      </div>
      <div class="chips" id="yearChips"></div>

      <div class="section-title" style="margin:16px 0 8px;">頻出度しぼり込み</div>
      <div class="chips" id="freqChips"></div>
    </div>

    <div class="card">
      <label class="section-title" for="qcount">出題数</label>
      <div class="chips" id="countChips" style="margin-bottom:10px;"></div>
      <div class="count-line">対象 <b id="poolCount">0</b> 問中 → <b id="willAsk">0</b> 問出題</div>
      <button class="primary" id="startBtn">演習をはじめる</button>
    </div>
  </div>

  <!-- ============ 演習画面 ============ -->
  <div id="quizView" class="hide">
    <div class="card">
      <div class="qbar">
        <span id="qPos"></span>
        <span><button class="mini-btn" id="bookmarkBtn">☆ 後で見返す</button>
        <button class="mini-btn" id="quitBtn">中断</button></span>
      </div>
      <div class="progress"><i id="bar" style="width:0%"></i></div>
      <div id="timerWrap" class="hide">
        <div class="timer-bar"><i id="timerFill"></i></div>
        <div id="timerText" class="timer-text"></div>
      </div>
      <div class="qmeta"><span id="qMeta"></span> <span class="freqbadge hide" id="qFreq"></span></div>
      <div class="hint hide" id="multiHint">⚑ この問題は複数選択です</div>
      <div class="stem" id="stem"></div>
      <div id="choices"></div>
      <div class="feedback hide" id="feedback"></div>
      <div class="ask-ai hide" id="askAi">
        <div class="muted" style="font-size:.8rem; margin-bottom:6px;">AIに聞く（プロンプトは自動コピーされます）</div>
        <div class="ask-mode" id="askMode">
          <button class="askmode-chip on" data-kind="explain">答えの解説</button>
          <button class="askmode-chip" data-kind="terms">用語の解説</button>
        </div>
        <div class="ask-row">
          <button class="ai-btn" data-ai="chatgpt">ChatGPT</button>
          <button class="ai-btn" data-ai="claude">Claude</button>
          <button class="ai-btn" data-ai="gemini">Gemini</button>
        </div>
      </div>
      <button class="primary hide" id="submitBtn">解答する</button>
      <button class="primary hide" id="nextBtn">次の問題 →</button>
    </div>
  </div>

  <!-- ============ 結果画面 ============ -->
  <div id="resultView" class="hide">
    <div class="card score-big">
      <div class="muted">今回のスコア</div>
      <div class="pct"><span id="rPct">0</span>%</div>
      <div id="rScore" class="muted"></div>
    </div>
    <div class="card">
      <div class="section-title">分野別の正答</div>
      <div id="rBreak"></div>
    </div>
    <div class="card">
      <button class="primary" id="reviewWrongBtn">この回の間違いを復習</button>
      <div class="row-btns">
        <button class="ghost" id="againBtn">もう一度同じ範囲</button>
        <button class="ghost" id="homeBtn">トップへ戻る</button>
      </div>
    </div>
  </div>

  <!-- ============ エクスポート・モーダル ============ -->
  <div id="exportModal" class="modal hide">
    <div class="modal-box">
      <div class="section-title">間違えた問題のエクスポート</div>
      <p class="muted" id="exportInfo" style="margin:4px 0 0;"></p>
      <textarea id="exportText" readonly></textarea>
      <button class="primary" id="copyBtn">クリップボードにコピー</button>
      <div class="row-btns">
        <button class="ghost" id="downloadBtn">.mdファイルで保存</button>
        <button class="ghost" id="closeExportBtn">閉じる</button>
      </div>
    </div>
  </div>

  <!-- ============ 弱点分析モーダル ============ -->
  <div id="analyzeModal" class="modal hide">
    <div class="modal-box">
      <div class="section-title">弱点をAIに分析してもらう</div>
      <p class="muted" id="analyzeInfo" style="margin:4px 0 0;"></p>
      <textarea id="analyzeText" readonly></textarea>
      <div class="muted" style="font-size:.8rem; margin-bottom:6px;">下のAIで開く（プロンプトは自動コピーされます）</div>
      <div class="ask-row">
        <button class="ai-btn" data-ai="chatgpt" data-target="analyze">ChatGPT</button>
        <button class="ai-btn" data-ai="claude" data-target="analyze">Claude</button>
        <button class="ai-btn" data-ai="gemini" data-target="analyze">Gemini</button>
      </div>
      <div class="row-btns" style="margin-top:10px;">
        <button class="ghost" id="analyzeCopyBtn">コピー</button>
        <button class="ghost" id="analyzeCloseBtn">閉じる</button>
      </div>
    </div>
  </div>

  <footer>医療情報技師 過去問演習アプリ ／ データは output/ の過去問より生成</footer>
</div>

<script>

const STORE_KEY = "hit_quiz_progress";
const COUNT_OPTIONS = [10, 20, 50, 100, "全部"];

// ---------- 進捗（localStorage） ----------
function loadProgress() {
  const def = { totalAnswered:0, totalCorrect:0, byCategory:{}, wrongIds:[], bookmarkIds:[], seenIds:{} };
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return def;
    return Object.assign(def, JSON.parse(raw));
  } catch(e) { return def; }
}
function saveProgress(p) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch(e) {}
}
let progress = loadProgress();

function recordResult(q, correct) {
  progress.totalAnswered++;
  if (correct) progress.totalCorrect++;
  const c = progress.byCategory[q.category] || { answered:0, correct:0 };
  c.answered++; if (correct) c.correct++;
  progress.byCategory[q.category] = c;
  const set = new Set(progress.wrongIds);
  if (correct) set.delete(q.id); else set.add(q.id);
  progress.wrongIds = [...set];
  progress.seenIds[q.id] = { correct, ts: Date.now() };
  saveProgress(progress);
}

const PASS_LINE = 70; // 合格ボーダー（%）

function catPct(cat) {
  const c = progress.byCategory[cat] || { answered: 0, correct: 0 };
  return { ...c, pct: c.answered ? Math.round(c.correct / c.answered * 100) : 0 };
}

function refreshStats() {
  $("stAnswered").textContent = progress.totalAnswered;
  const overall = progress.totalAnswered
    ? Math.round(progress.totalCorrect / progress.totalAnswered * 100) : 0;
  $("stRate").textContent = progress.totalAnswered ? overall + "%" : "–";
  $("stWrong").textContent = progress.wrongIds.length;
  $("stBookmark").textContent = progress.bookmarkIds.length;

  // 合格判定バナー（3分野すべて70%以上で合格圏）
  const judge = $("passJudge");
  const attempted = CATEGORIES.filter(c => (progress.byCategory[c] || {}).answered);
  if (attempted.length === 0) {
    judge.classList.add("hide");
  } else {
    judge.classList.remove("hide");
    const below = attempted.filter(c => catPct(c).pct < PASS_LINE);
    const allTried = attempted.length === CATEGORIES.length;
    const minAns = Math.min(...attempted.map(c => catPct(c).answered));
    const small = minAns < 10 ? "<span class='sub'>※ 各分野とも10問以上解くと判定が安定します</span>" : "";
    if (below.length === 0 && allTried) {
      judge.className = "judge pass";
      judge.innerHTML = `合格圏内です ✓　全${CATEGORIES.length}分野で${PASS_LINE}%を達成`
        + `<span class="sub">通算正答率 ${overall}%</span>` + small;
    } else if (below.length === 0) {
      judge.className = "judge pass";
      judge.innerHTML = `挑戦した分野はすべて${PASS_LINE}%以上 ✓`
        + `<span class="sub">未挑戦：${CATEGORIES.filter(c=>!attempted.includes(c)).join("・")||"なし"}</span>` + small;
    } else {
      judge.className = "judge fail";
      const detail = below.map(c => {
        const p = catPct(c); return `${c}（${p.pct}%／あと${PASS_LINE - p.pct}pt）`;
      }).join("、");
      judge.innerHTML = `合格ライン未達の分野があります`
        + `<span class="sub">要強化：${detail}</span>` + small;
    }
  }

  // 分野別 正解率（70%ライン付き）
  const box = $("catRates"); box.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const c = catPct(cat);
    const tried = c.answered > 0;
    const pass = c.pct >= PASS_LINE;
    const verdict = tried
      ? `<span class="verdict ${pass?'pass':'fail'}">${pass?'合格圏 ✓':'要強化'}</span>` : "";
    const right = tried
      ? `${verdict} <b>${c.pct}%</b>（${c.correct}/${c.answered}）`
      : '<span class="muted">未挑戦</span>';
    const row = document.createElement("div");
    row.className = "crate";
    row.innerHTML =
      `<div class="crate-head"><span>${cat}</span><span>${right}</span></div>` +
      `<div class="crate-bar"><i class="${pass?'pass':'fail'}" style="width:${c.pct}%"></i>` +
      `<span class="pass-line"></span></div>`;
    box.appendChild(row);
  });
}

    .sort((a,b)=> a.year-b.year || a.category.localeCompare(b.category) || a.no-b.no);

  lines.push("を簡潔にまとめてください。関連する周辺知識の補足資料もあると助かります。");
  lines.push("");
  lines.push("---");

function generateAnalysisPrompt() {
  const overall = progress.totalAnswered
    ? Math.round(progress.totalCorrect / progress.totalAnswered * 100) : 0;
  const lines = [];
  lines.push("あなたは医療情報技師試験の学習コーチです。以下は私の過去問演習の成績データです。");
  lines.push(`合格ラインは各分野${PASS_LINE}%とします。次の観点で具体的に分析してください。`);
  lines.push("1) 私の苦手分野と弱点の傾向");
  lines.push("2) 間違いの特徴（特に頻出論点を取りこぼしていないか、分野内のどのテーマが弱いか）");
  lines.push(`3) ${PASS_LINE}%到達に向けて重点的に学習すべきトピックと優先順位`);
  lines.push("4) 上記を踏まえた具体的な学習プラン（順番・教材の使い方）");
  lines.push("");
  lines.push("## 成績サマリー");
  lines.push(`- 通算：${progress.totalAnswered}問中 ${progress.totalCorrect}問正解（${overall}%）`);
  CATEGORIES.forEach(cat => {
    const c = catPct(cat);
    if (!c.answered) { lines.push(`- ${cat}：未挑戦`); return; }
    const v = c.pct >= PASS_LINE ? "合格圏" : `要強化（あと${PASS_LINE - c.pct}pt）`;
    lines.push(`- ${cat}：${c.pct}%（${c.correct}/${c.answered}）… ${v}`);
  });
  lines.push("");
  const ws = new Set(progress.wrongIds);
  const wrong = QUESTIONS.filter(q => ws.has(q.id));
  const starMissed = wrong.filter(q => q.stars > 0).length;
  lines.push(`## 間違えたまま（復習待ち）の問題：${wrong.length}問（うち頻出★問題 ${starMissed}問）`);
  lines.push("以下の論点リストから、私が落としやすいテーマの傾向を読み取ってください。");
  lines.push("");
  const CAP = 60, byCat = {};
  wrong.forEach(q => (byCat[q.category] = byCat[q.category] || []).push(q));
  let shown = 0;
  CATEGORIES.forEach(cat => {
    const list = byCat[cat]; if (!list) return;
    lines.push(`### ${cat}（${list.length}問）`);
    list.sort((a,b)=> b.stars - a.stars || a.year - b.year);
    list.forEach(q => {
      if (shown >= CAP) return;
      const star = q.stars > 0 ? ` [頻出${"★".repeat(q.stars)}]` : "";
      lines.push(`- ${q.year}年 問${q.no}${star}：${q.stem}`);
      shown++;
    });
    lines.push("");
  });
  if (wrong.length > CAP) lines.push(`（ほか ${wrong.length - CAP}問は省略）`);
  return lines.join("\n");
}

// ---------- セッション ----------
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// 頻出度で重み付けした非復元抽出（★が高いほど選ばれやすい）
function weightedSample(pool, k) {
  const items = pool.slice();
  const picked = [];
  while (items.length && picked.length < k) {
    const weights = items.map(q => Math.pow(2, q.stars)); // ★0:1, ★1:2, ★2:4, ★3:8
    let total = weights.reduce((a,b)=>a+b, 0);
    let r = Math.random() * total, idx = 0;
    while (r > weights[idx]) { r -= weights[idx]; idx++; }
    picked.push(items.splice(idx, 1)[0]);
  }
  return picked;
}

// 同じクラスタの問題が連続するように並べる（クラスタ順はシャッフル）
function clusterOrder(pool) {
  const groups = {};
  pool.forEach(q => { (groups[q.cluster] = groups[q.cluster] || []).push(q); });
  const order = shuffle(Object.keys(groups));
  // 類似問が多いクラスタを優先（連続演習の効果が高い）
  order.sort((a,b)=> groups[b].length - groups[a].length);
  const list = [];
  order.forEach(c => list.push(...groups[c]));
  return list;
}

function startSession() {
  let pool = currentPool();
  if (pool.length === 0) return;
  const cap = (selCount === "all") ? pool.length : selCount;
  let list;
  if (selMode === "year") {
    list = pool.slice().sort((a,b)=> a.year-b.year || a.category.localeCompare(b.category) || a.no-b.no);
  } else if (LIST_MODES[selMode]) {
    list = shuffle(pool.slice());
  } else if (selMode === "freq") {
    list = weightedSample(pool, cap);
  } else if (selMode === "cluster") {
    list = clusterOrder(pool).slice(0, cap);
  } else {  // ランダム / タイムアタック
    list = shuffle(pool.slice());
    if (selCount !== "all") list = list.slice(0, selCount);
  }
  session = { list, idx:0, correctCount:0, answers:[],
    timeAttack: selMode === "timeattack", startTime: Date.now() };
  show("quizView"); renderQuestion();
}

function renderQuestion() {
  clearTimers();

  } else {
    fb.classList.add("hide");
  }
  $("stem").textContent = q.stem;
  $("multiHint").classList.toggle("hide", !q.multi);
  const box = $("choices"); box.innerHTML = "";
  q._picked = new Set();

    const n = i+1;

    el.onclick = () => {
      if (el.classList.contains("locked")) return;

        q._picked.has(n) ? q._picked.delete(n) : q._picked.add(n);
        el.classList.toggle("sel");
        $("submitBtn").disabled = q._picked.size === 0;
      } else {
        box.querySelectorAll(".choice").forEach(c=>c.classList.remove("sel"));
        q._picked = new Set([n]); el.classList.add("sel");
        // タイムアタックの単一選択はタップで即採点（テンポ重視）
        if (session.timeAttack) { gradeCurrent(false); return; }
        $("submitBtn").disabled = false;
      }
    };
    box.appendChild(el);
  });
  $("feedback").classList.add("hide");
  $("askAi").classList.add("hide");
  $("nextBtn").classList.add("hide");
  // ブックマーク状態を反映
  const marked = progress.bookmarkIds.includes(q.id);
  const bm = $("bookmarkBtn");
  bm.classList.toggle("on", marked);
  bm.textContent = marked ? "★ 見返す登録済み" : "☆ 後で見返す";
  const sb = $("submitBtn");
  if (session.timeAttack && !q.multi) {
    sb.classList.add("hide");  // タップで即採点するので解答ボタン不要
  } else {
    sb.classList.remove("hide"); sb.disabled = true;
    sb.textContent = q.multi ? "解答する（複数選択）" : "解答する";
  }
  // タイムアタックはタイマー開始
  if (session.timeAttack) startTimer(); else $("timerWrap").classList.add("hide");
}

// ---------- タイマー（タイムアタック用） ----------
const TIME_PER_Q = 20; // 1問あたりの制限秒
let timerInterval = null, timerTimeout = null, advanceTimeout = null;
function clearTimers() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (timerTimeout) { clearTimeout(timerTimeout); timerTimeout = null; }
  if (advanceTimeout) { clearTimeout(advanceTimeout); advanceTimeout = null; }
}
function startTimer() {
  const fill = $("timerFill");
  $("timerWrap").classList.remove("hide");
  let remain = TIME_PER_Q;
  $("timerText").textContent = remain + "秒";
  fill.classList.remove("danger");
  fill.style.transition = "none"; fill.style.width = "100%";
  void fill.offsetWidth; // リフローを強制してアニメを効かせる
  fill.style.transition = `width ${TIME_PER_Q}s linear`;
  fill.style.width = "0%";
  timerInterval = setInterval(() => {
    remain--;
    $("timerText").textContent = Math.max(remain, 0) + "秒";
    if (remain <= 5) fill.classList.add("danger");
    if (remain <= 0) { clearInterval(timerInterval); timerInterval = null; }
  }, 1000);
  timerTimeout = setTimeout(() => gradeCurrent(true), TIME_PER_Q * 1000);
}

// ---------- 採点 ----------
function gradeCurrent(timeUp) {
  const q = currentQuestion();
  if (!q || q._graded) return;
  q._graded = true;
  clearTimers();
  $("timerWrap").classList.add("hide");
  const ans = new Set(q.answer), picked = q._picked;
  const answered = picked.size > 0;
  const correct = answered && picked.size === ans.size && [...picked].every(n=>ans.has(n));
  const box = $("choices");
  [...box.children].forEach((el, i) => {
    const n = i+1; el.classList.add("locked"); el.classList.remove("sel");
    if (ans.has(n)) el.classList.add("correct");
    else if (picked.has(n)) el.classList.add("wrong");
  });
  const fb = $("feedback");
  fb.className = "feedback " + (correct ? "ok" : "ng");
  fb.textContent = correct ? "正解！"
    : ((timeUp && !answered) ? "⏱ 時間切れ　" : "不正解　") + "正答：" + q.answer.join("・");
  fb.classList.remove("hide");
  $("submitBtn").classList.add("hide");
  if (correct) session.correctCount++;
  session.answers.push({ q, correct });
  recordResult(q, correct);
  if (session.timeAttack) {
    advanceTimeout = setTimeout(nextQuestion, 1100); // テンポよく自動で次へ
  } else {
    $("askAi").classList.remove("hide");
    $("nextBtn").classList.remove("hide");
  }
}

function nextQuestion() {
  clearTimers();
  session.idx++;
  if (session.idx >= session.list.length) showResult();
  else renderQuestion();
}

// クリップボードへコピー（file:// でも動くようフォールバック付き）
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text); return true;
    }
  } catch(e) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta); return ok;
  } catch(e) { return false; }
}

// 問題文・選択肢から専門用語らしき語を抽出（カタカナ語・英字略語）
function extractTerms(q) {
  const text = q.stem + " " + q.choices.join(" ");
  const terms = new Set();
  (text.match(/[ァ-ヴー]{3,}/g) || []).forEach(t => terms.add(t));
  (text.match(/[A-Za-z][A-Za-z0-9./\-]{1,}/g) || []).forEach(t => terms.add(t));
  return [...terms].slice(0, 15);
}
function termPrompt(q) {
  const choices = q.choices.map((c,i)=>`${i+1}. ${c}`).join("\n");
  const terms = extractTerms(q);
  const lines = [
    "次の医療情報技師試験の問題に登場する専門用語を、初学者にもわかるように一つずつ簡潔に解説してください。",
    "各用語は「用語：意味（1〜2文）」の形式で、医療情報の文脈に沿ってお願いします。",
    "",
    `【${q.year}年度 ${q.category} 問${q.no}】`,
    q.stem,
    choices,
  ];
  if (terms.length) lines.push("", "特に次の用語を優先して解説してください：" + terms.join("、"));
  return lines.join("\n");
}
let askKind = "explain"; // explain=答えの解説 / terms=用語の解説
const AI_URLS = {
  chatgpt: p => "https://chatgpt.com/?q=" + encodeURIComponent(p),
  claude:  p => "https://claude.ai/new?q=" + encodeURIComponent(p),
  gemini:  () => "https://gemini.google.com/app",  // URLプリフィル非対応のためコピーで貼り付け
};
async function launchAI(ai, prompt, btn) {
  // ポップアップブロック回避のため、まず同じ操作内でタブを開く
  const win = window.open(AI_URLS[ai](prompt), "_blank");
  await copyToClipboard(prompt);  // どのAIでも確実に貼れるようコピー
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = ai === "gemini" ? "コピー済→貼付" : "送信しました";
    setTimeout(()=>{ btn.textContent = orig; }, 1800);
  }
  if (!win) alert("ポップアップがブロックされました。プロンプトはコピー済みです。");
}
document.querySelectorAll("#askMode .askmode-chip").forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll("#askMode .askmode-chip").forEach(c=>c.classList.remove("on"));
    chip.classList.add("on"); askKind = chip.dataset.kind;
  };
});
document.querySelectorAll("#askAi .ai-btn").forEach(btn => {
  btn.onclick = () => {
    const q = currentQuestion(); if (!q) return;
    const prompt = askKind === "terms" ? termPrompt(q) : aiPrompt(q);
    launchAI(btn.dataset.ai, prompt, btn);
  };
});

// ---------- 結果 ----------
function showResult() {
  clearTimers();
  const total = session.list.length, ok = session.correctCount;
  $("rPct").textContent = Math.round(ok/total*100);
  let scoreText = `${total}問中 ${ok}問 正解`;
  if (session.timeAttack) {
    const secs = Math.round((Date.now() - session.startTime) / 1000);
    const avg = (secs / total).toFixed(1);
    scoreText += `　⏱ 所要${secs}秒（平均${avg}秒/問）`;
  }
  $("rScore").textContent = scoreText;
  const by = {};
  session.answers.forEach(a => {
    const c = by[a.q.category] || {a:0,c:0}; c.a++; if(a.correct)c.c++; by[a.q.category]=c;
  });
  const bd = $("rBreak"); bd.innerHTML = "";
  Object.entries(by).forEach(([cat,v]) => {
    const row = document.createElement("div"); row.className="bd";
    row.innerHTML = `<span>${cat}</span><span><b>${v.c}/${v.a}</b> （${Math.round(v.c/v.a*100)}%）</span>`;
    bd.appendChild(row);
  });
  const wrongThisRound = session.answers.filter(a=>!a.correct).map(a=>a.q);
  $("reviewWrongBtn").style.display = wrongThisRound.length ? "block" : "none";
  $("reviewWrongBtn").onclick = () => {
    session = { list: shuffle(wrongThisRound.slice()), idx:0, correctCount:0, answers:[],
      timeAttack:false, startTime: Date.now() };
    show("quizView"); renderQuestion();
  };
  show("resultView");
}
$("againBtn").onclick = startSession;
$("homeBtn").onclick = goHome;

function goHome() { clearTimers(); refreshStats(); refreshPool(); show("startView"); }

// ---------- 共通 ----------
function show(view) {
  ["startView","quizView","resultView"].forEach(v => $(v).classList.toggle("hide", v!==view));
  window.scrollTo(0,0);
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- 初期化 ----------
$("bankInfo").textContent = `全${QUESTIONS.length}問（${YEARS[0]}〜${YEARS[YEARS.length-1]}年度・${CATEGORIES.length}分野）`;
buildChips(); refreshStats(); refreshPool();
</script>
